<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatIA - Teste de Audio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; font-size: 1.5rem; color: #e94560; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 1rem; margin-bottom: 12px; color: #e94560; }
        #status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            background: #0f3460;
            margin-bottom: 16px;
            font-size: 0.9rem;
            min-height: 44px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-talk { background: #e94560; color: white; font-size: 1.1rem; }
        .btn-talk.recording { background: #ff0000; animation: pulse 1s infinite; }
        .btn-send { background: #533483; color: white; }
        .btn-again { background: #0f3460; color: white; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .transcript {
            background: #0f3460;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 12px;
            min-height: 40px;
            color: #ccc;
            word-wrap: break-word;
        }
        .response {
            background: #1a1a40;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #7fdbca;
            min-height: 40px;
            word-wrap: break-word;
        }
        .examples { margin-top: 10px; }
        .examples p { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
        .examples code {
            display: block;
            background: #0f3460;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>ChatIA</h1>
    <p class="subtitle">Teste por voz - API de Orcamento Financeiro</p>

    <div class="card">
        <h2>Fale seu comando</h2>
        <div id="status">Toque para falar</div>
        <button class="btn btn-talk" id="btnTalk" onclick="toggleListening()">Falar</button>
    </div>

    <div class="card">
        <h2>O que voce disse</h2>
        <div class="transcript" id="transcript">...</div>
        <button class="btn btn-send" id="btnSend" onclick="sendToAI()" disabled>Enviar para IA</button>
    </div>

    <div class="card">
        <h2>Resposta da IA</h2>
        <div class="response" id="response">...</div>
        <button class="btn btn-again" id="btnSpeak" onclick="speakResponse()" disabled>Ouvir resposta</button>
    </div>

    <div class="card examples">
        <h2>Exemplos</h2>
        <p>Diga algo como:</p>
        <code>Registre um gasto de 50 reais no mercado</code>
        <code>Paguei 30 reais na farmacia</code>
        <code>Quanto gastei com alimentacao?</code>
        <code>Me resuma todos os gastos</code>
    </div>

    <script>
        let recognition;
        let isListening = false;
        let finalTranscript = '';

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            document.getElementById('status').textContent = 'Seu navegador nao suporta reconhecimento de voz';
            document.getElementById('btnTalk').disabled = true;
        } else {
            recognition = new SpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                document.getElementById('transcript').textContent = finalTranscript + interim;
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('btnTalk').classList.remove('recording');
                document.getElementById('btnTalk').textContent = 'Falar';
                if (finalTranscript.trim()) {
                    document.getElementById('status').textContent = 'Pronto para enviar';
                    document.getElementById('btnSend').disabled = false;
                } else {
                    document.getElementById('status').textContent = 'Nenhum texto detectado. Toque para tentar novamente.';
                }
            };

            recognition.onerror = (event) => {
                isListening = false;
                document.getElementById('btnTalk').classList.remove('recording');
                document.getElementById('btnTalk').textContent = 'Falar';
                document.getElementById('status').textContent = 'Erro: ' + event.error;
            };
        }

        function toggleListening() {
            if (isListening) {
                recognition.stop();
            } else {
                finalTranscript = '';
                document.getElementById('transcript').textContent = '...';
                document.getElementById('response').textContent = '...';
                document.getElementById('btnSend').disabled = true;
                document.getElementById('btnSpeak').disabled = true;
                document.getElementById('status').textContent = 'Ouvindo... Toque para parar';
                document.getElementById('btnTalk').classList.add('recording');
                document.getElementById('btnTalk').textContent = 'Parar';
                recognition.start();
                isListening = true;
            }
        }

        async function sendToAI() {
            document.getElementById('status').textContent = 'Enviando para IA...';
            document.getElementById('btnSend').disabled = true;

            try {
                const host = window.location.origin;
                const res = await fetch(`${host}/transactions/ai`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: finalTranscript
                });

                const text = await res.text();
                document.getElementById('response').textContent = text;
                document.getElementById('status').textContent = 'Resposta recebida!';
                document.getElementById('btnSpeak').disabled = false;
                document.getElementById('btnSend').disabled = false;
            } catch (err) {
                document.getElementById('status').textContent = 'Erro: ' + err.message;
                document.getElementById('btnSend').disabled = false;
            }
        }

        function speakResponse() {
            const text = document.getElementById('response').textContent;
            if (!text || text === '...') return;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
