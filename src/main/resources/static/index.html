<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatIA - Teste de Audio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 10px; font-size: 1.5rem; color: #e94560; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 1rem; margin-bottom: 12px; color: #e94560; }
        #status {
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            background: #0f3460;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-record { background: #e94560; color: white; }
        .btn-record.recording { background: #ff0000; animation: pulse 1s infinite; }
        .btn-stop { background: #533483; color: white; }
        .btn-send { background: #0f3460; color: white; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        #timer { text-align: center; font-size: 1.5rem; margin: 10px 0; font-variant-numeric: tabular-nums; }
        #response-audio { width: 100%; margin-top: 10px; }
        .examples { margin-top: 10px; }
        .examples p { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
        .examples code {
            display: block;
            background: #0f3460;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>ChatIA</h1>
    <p class="subtitle">Teste de Audio - API de Orcamento Financeiro</p>

    <div class="card">
        <h2>Gravar Audio</h2>
        <div id="status">Pronto para gravar</div>
        <div id="timer">00:00</div>
        <button class="btn btn-record" id="btnRecord" onclick="startRecording()">Gravar</button>
        <button class="btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>Parar</button>
        <button class="btn btn-send" id="btnSend" onclick="sendAudio()" disabled>Enviar para IA</button>
    </div>

    <div class="card">
        <h2>Resposta da IA</h2>
        <audio id="response-audio" controls></audio>
        <div id="response-text" style="margin-top: 10px; font-size: 0.85rem; color: #aaa;"></div>
    </div>

    <div class="card examples">
        <h2>Exemplos de comandos</h2>
        <p>Diga algo como:</p>
        <code>Gastei 50 reais no mercado</code>
        <code>Paguei 30 reais na farmacia</code>
        <code>Comprei gasolina por 200 reais</code>
        <code>Quanto gastei com alimentacao?</code>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let timerInterval;
        let seconds = 0;

        function updateTimer() {
            seconds++;
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.start();

                document.getElementById('btnRecord').classList.add('recording');
                document.getElementById('btnRecord').disabled = true;
                document.getElementById('btnStop').disabled = false;
                document.getElementById('btnSend').disabled = true;
                document.getElementById('status').textContent = 'Gravando...';
                seconds = 0;
                timerInterval = setInterval(updateTimer, 1000);
            } catch (err) {
                document.getElementById('status').textContent = 'Erro: Permite o microfone!';
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            clearInterval(timerInterval);

            document.getElementById('btnRecord').classList.remove('recording');
            document.getElementById('btnRecord').disabled = false;
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnSend').disabled = false;
            document.getElementById('status').textContent = `Gravado: ${seconds}s - Pronto para enviar`;
        }

        async function sendAudio() {
            document.getElementById('status').textContent = 'Enviando para IA...';
            document.getElementById('btnSend').disabled = true;

            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append('file', blob, 'audio.webm');

            try {
                const host = window.location.origin;
                const res = await fetch(`${host}/transactions/ai`, {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ message: res.statusText }));
                    document.getElementById('status').textContent = `Erro: ${err.message || res.statusText}`;
                    document.getElementById('btnSend').disabled = false;
                    return;
                }

                const audioBlob = await res.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audioEl = document.getElementById('response-audio');
                audioEl.src = audioUrl;

                document.getElementById('status').textContent = 'Resposta recebida! Pressione play.';
                document.getElementById('btnSend').disabled = false;
                audioEl.play();
            } catch (err) {
                document.getElementById('status').textContent = `Erro de conexao: ${err.message}`;
                document.getElementById('btnSend').disabled = false;
            }
        }
    </script>
</body>
</html>
